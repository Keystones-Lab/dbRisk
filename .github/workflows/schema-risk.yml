name: SchemaRisk Migration Safety Check

on:
  pull_request:
    paths:
      - "migrations/**/*.sql"
      - "db/migrations/**/*.sql"
      - "*.sql"

permissions:
  contents: read
  pull-requests: write

env:
  SCHEMA_RISK_VERSION: "2.0.0"
  CARGO_TERM_COLOR: always

jobs:
  schema-risk:
    name: Analyse Migration Safety
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0           # full history needed for git diff

      # ── Rust toolchain & cache ───────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo registry and build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: schema-risk-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      # ── Build schema-risk binary ─────────────────────────────────────────────
      - name: Build schema-risk
        run: cargo build --release --manifest-path schema-risk/Cargo.toml
        env:
          RUSTFLAGS: "-D warnings"

      - name: Add schema-risk to PATH
        run: echo "${{ github.workspace }}/schema-risk/target/release" >> "$GITHUB_PATH"

      # ── Detect changed migration files ───────────────────────────────────────
      - name: Find changed SQL files
        id: changed_files
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          FILES=$(git diff --name-only --diff-filter=ACM "$BASE" "$HEAD" \
                  | grep -E '\.(sql)$' \
                  | grep -E '(migrations|db/migrations)' \
                  || true)

          # Flatten to a single space-separated list for the CLI
          FILE_LIST=$(echo "$FILES" | tr '\n' ' ' | sed 's/ *$//')
          echo "files=${FILE_LIST}" >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$FILES" | grep -c '.' || echo 0)" >> "$GITHUB_OUTPUT"

          if [ -z "$FILE_LIST" ]; then
            echo "::notice::No migration SQL files changed in this PR"
          else
            echo "::notice::Migration files to analyse: $FILE_LIST"
          fi

      # ── Run analysis ─────────────────────────────────────────────────────────
      - name: Run schema-risk analysis
        if: steps.changed_files.outputs.files != ''
        id: analysis
        run: |
          FILES="${{ steps.changed_files.outputs.files }}"

          # Build CI report (exits non-zero on CRITICAL by default)
          schema-risk ci-report \
            --files $FILES \
            --format github-comment \
            --fail-on critical \
            ${SCHEMA_RISK_DB_URL:+--db-url "$SCHEMA_RISK_DB_URL"} \
            > /tmp/schema_risk_report.md 2>&1 || EXITCODE=$?

          echo "exit_code=${EXITCODE:-0}" >> "$GITHUB_OUTPUT"

          # Always print to the Actions log for debugging
          cat /tmp/schema_risk_report.md || true
        env:
          SCHEMA_RISK_DB_URL: ${{ secrets.SCHEMA_RISK_DB_URL }}
          RUST_LOG: "schema_risk=info"

      # ── Post PR comment ──────────────────────────────────────────────────────
      - name: Post migration risk comment on PR
        if: steps.changed_files.outputs.files != '' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('/tmp/schema_risk_report.md', 'utf8').trim();
            } catch (e) {
              body = '> **SchemaRisk**: Analysis report not generated — see workflow logs.';
            }
            if (!body) {
              body = '> **SchemaRisk**: No migration risks detected.';
            }

            const marker = '<!-- schema-risk-report -->';
            body = `${marker}\n\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            // Update existing comment rather than creating duplicates
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
              console.log('Created new SchemaRisk comment');
            }

      # ── Skip message for PRs with no SQL changes ─────────────────────────────
      - name: No migration changes detected
        if: steps.changed_files.outputs.files == ''
        run: echo "No migration SQL files were modified in this PR — skipping SchemaRisk analysis."

      # ── Fail the workflow on CRITICAL risk ───────────────────────────────────
      - name: Fail on critical migration risk
        if: steps.analysis.outputs.exit_code != '' && steps.analysis.outputs.exit_code != '0'
        run: |
          echo "::error::SchemaRisk detected CRITICAL migration risks. See the PR comment for details."
          exit ${{ steps.analysis.outputs.exit_code }}
